<!DOCTYPE html>
<html>
<head>
    <style>
        .contenedor { width: 600px; border: 2px solid red; overflow: hidden; margin: 0 auto; }
        .contenedor div { border: 1px solid red; text-align: center; box-sizing: border-box; float: left; padding: 10px; }

        
        .d1, .d7 { width: 100%; height: 40px; clear: both; }

        
        .d2, .d3 { width: 20%; height: 200px; }

      
        .d4, .d5 { width: 30%; height: 140px; }
        .d6 { width: 60%; height: 60px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="d1">1</div>
        <div class="d7">7</div>
        <div class="d2">2</div>
        <div class="d4">4</div>
        <div class="d5">5</div>
        <div class="d3">3</div>
        <div class="d6">6</div>
    </div>
</body>
</html>
